# ============================================================
# XyCore 主配置
# 适用版本：Paper 1.12.2
#
# 说明：
# 1. 这里只放 Core 的基础设置和模块总开关。
# 2. 开启某个模块后，模块自己的配置会生成在 plugins/XyCore/modules/。
# 3. 改完配置后可以使用 /xycore reload 重载；数据库类型变化建议重启服务器。
# ============================================================

modules:
  # ============================================================
  # 模块总开关
  # false = 关闭模块，不生成/不加载对应模块配置。
  # true  = 开启模块，启动服务器或执行 /xycore reload 后生成对应模块配置。
  # 已开启模块改回 false 并执行 /xycore reload 后，会删除对应模块 yml。
  # ============================================================

  # LoreCommandBind：Lore 识别指令模块。
  # 作用：识别物品 Lore，触发服务端预设命令、冷却、消耗、条件和临时属性效果。
  # 开启后生成：plugins/XyCore/modules/LoreCommandBind.yml
  lore-command-bind: false

  # WorldProtect：世界保护模块。
  # 作用：按世界禁止方块破坏/放置、桶、展示框、画、盔甲架等行为。
  # 开启后生成：plugins/XyCore/modules/world-protect.yml
  world-protect: false

  # WorldPermission：世界权限管控模块。
  # 作用：按世界临时给予或收回权限，适合只在家园世界开放 essentials.tpa / essentials.sethome。
  # 开启后生成：plugins/XyCore/modules/world-permission.yml
  world-permission: false

  # DeathKeepModule：死亡不掉落模块。
  # 作用：按世界开启死亡不掉落，保留背包和经验。
  # 开启后生成：plugins/XyCore/modules/DeathKeepModule.yml
  death-keep: false

  # PvpProtectModule：禁止 PVP 模块。
  # 作用：按世界禁止玩家之间的直接和间接伤害。
  # 开启后生成：plugins/XyCore/modules/PvpProtectModule.yml
  pvp-protect: false

  # AlwaysDayModule：永远白天模块。
  # 作用：按世界保持白天。
  # 开启后生成：plugins/XyCore/modules/AlwaysDayModule.yml
  always-day: false

  # NoRainModule：永远不下雨模块。
  # 作用：按世界禁止下雨和雷暴。
  # 开启后生成：plugins/XyCore/modules/NoRainModule.yml
  no-rain: false

  # Kit：礼包/新手包模块预留开关。
  # 当前 0.3.2 暂未实现，开启也不会生成模块配置。
  kit: false

  # Nickname：昵称模块预留开关。
  # 当前 0.3.2 暂未实现，后续可用于玩家昵称、称号显示等功能。
  nickname: false

  # Script：脚本模块预留开关。
  # 当前 0.3.2 暂未实现，后续可用于轻量脚本、事件监听、命令注入等扩展。
  script: false

storage:
  # 数据存储类型：
  # yaml   = 本地 YML，适合开发测试，不建议正式服长期使用。
  # sqlite = 本地 SQLite，适合单服测试或小型服务器。
  # mysql  = MySQL/MariaDB，推荐正式服使用。
  type: yaml

  # JDBC 初始化失败时是否自动降级到 YML。
  # 正式服建议保持 true，避免数据库临时异常导致 Core 直接无法启动。
  fallback-to-yaml: true

  sqlite:
    # SQLite 数据库文件名，生成在 plugins/XyCore/ 下。
    file: data.db

  mysql:
    # MySQL/MariaDB 连接地址。
    url: jdbc:mysql://127.0.0.1:3306/xycore?useUnicode=true&characterEncoding=utf8&useSSL=false
    username: root
    password: change-me
    # 玩家模块数据表名。
    table: xycore_player_module

  pool:
    # HikariCP 连接池设置。
    # RPG 单服通常 5-10 个连接已经足够，过大反而会增加数据库压力。
    maximum-pool-size: 10
    minimum-idle: 2
    connection-timeout-ms: 10000
    idle-timeout-ms: 600000
    max-lifetime-ms: 1800000

player-data:
  # 在线玩家数据自动保存间隔，单位：分钟。
  autosave-minutes: 5

  # 玩家数据加载失败后的处理：
  # kick     = 踢出玩家，保护数据一致性。
  # continue = 允许进入，但相关数据可能不可用。
  load-failure: kick
  kick-message: '&c玩家数据加载失败，请联系管理员。'

integrations:
  # MythicMobs 物品桥接。关闭后 Core 只提供原版物品 Provider。
  mythicmobs: true

  # PlaceholderAPI 桥接。未安装 PAPI 时 Core 仍可启动。
  placeholderapi: true

  # Vault 经济桥接。未安装 Vault 或经济插件时 Core 仍可启动。
  vault: true

  attributeplus:
    # AttributePlus 属性读取/属性源写入桥接。
    enabled: true
    # AttributePlus 变量模板。
    # {attribute} 会替换为属性名，例如 攻击力。
    # 默认示例：%ap_攻击力:max%
    placeholder-template: '%ap_{attribute}:max%'

  dragoncore:
    # DragonCore GUI、按键、客户端变量和数据包桥接。
    enabled: true
    # 需要注册的 DragonCore 按键名。
    # 示例：
    # register-keys:
    #   - forge_open
    #   - skill_cast
    register-keys: []

items:
  # 是否启用 1.12.2 NBT 标签读写接口。
  nbt-enabled: true

messages:
  # 全局插件前缀。
  # WorldProtect 默认会把这个前缀拼在提示前面。
  # 默认效果：[XyCore]该世界无法破坏方块
  # 如果想要空格，可以改成 '&7[&bXyCore&7]&r '
  prefix: '&7[&bXyCore&7]&r'
