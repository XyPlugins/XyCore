# ============================================================
# ServerRules 服务器规则模块
#
# 开启方式：
# 1. 打开 plugins/XyCore/config.yml
# 2. 设置 modules.server-rules: true
# 3. 使用 /xycore reload 或重启服务器
#
# 模块作用：
# - 用一个配置文件集中管理常用服务器基础规则
# - 死亡不掉落
# - 禁止 PVP
# - 接近天黑时拉回白天
# - 禁止下雨和雷暴
#
# 填写说明：
# - 每个功能下面只需要填写世界列表
# - 不写世界 = 该功能不生效
# - 世界名不区分大小写
# - '*' 表示所有已加载世界，注意必须加引号：'*'
# ============================================================

# 开启死亡不掉落的世界。
# 效果：玩家死亡后保留背包和经验，并清理掉落物/经验球，避免复制。
death-keep:
  # - world
  # - dungeon_world
  # - '*'

# 禁止 PVP 的世界。
# 效果：阻止玩家直接攻击、投掷物攻击、驯服生物攻击造成的玩家伤害。
pvp-protect:
  # - spawn
  # - home_world
  # - '*'

# 接近天黑时自动拉回白天的世界。
# 效果：不会每秒锁死时间；默认在接近黄昏时拉回正午，减少材质包天空持续变化。
always-day:
  # - world
  # - main_world
  # - '*'

# 永远不下雨、不打雷的世界。
# 效果：阻止雨天/雷暴开始，并定时清理已经出现的雨天和雷暴。
no-rain:
  # - world
  # - resource_world
  # - '*'
